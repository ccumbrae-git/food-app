<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d7a56"/>
      <stop offset="1" stop-color="#1a4d34"/>
    </linearGradient>
    <linearGradient id="cardShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="115" fill="url(#cardShine)"/>

  <!-- ── Left card (not selected) ── -->
  <g opacity="1" filter="url(#shadow)">
    <rect x="58" y="138" width="172" height="236" rx="22" fill="rgba(255,255,255,0.14)"/>
    <rect x="58" y="138" width="172" height="236" rx="22" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
  </g>
  <!-- Brand name bar -->
  <rect x="78" y="168" width="132" height="14" rx="7" fill="rgba(255,255,255,0.45)"/>
  <!-- Sub-lines -->
  <rect x="78" y="196" width="100" height="9" rx="4.5" fill="rgba(255,255,255,0.28)"/>
  <rect x="78" y="214" width="116" height="9" rx="4.5" fill="rgba(255,255,255,0.22)"/>
  <rect x="78" y="232" width="88"  height="9" rx="4.5" fill="rgba(255,255,255,0.18)"/>
  <!-- Price block -->
  <rect x="78" y="304" width="132" height="42" rx="10" fill="rgba(255,255,255,0.12)"/>
  <rect x="92"  y="316" width="64"  height="10" rx="5" fill="rgba(255,255,255,0.35)"/>
  <rect x="92"  y="330" width="44"  height="8"  rx="4" fill="rgba(255,255,255,0.25)"/>

  <!-- ── Right card (selected) ── -->
  <g filter="url(#shadow)">
    <rect x="282" y="118" width="172" height="256" rx="22" fill="white"/>
  </g>
  <!-- Shine strip on selected card -->
  <rect x="282" y="118" width="172" height="70" rx="22" fill="rgba(255,255,255,0.6)"/>
  <rect x="282" y="155" width="172" height="33"  fill="rgba(255,255,255,0.6)"/>
  <!-- Brand name bar -->
  <rect x="302" y="152" width="132" height="14" rx="7" fill="#1a4d34" opacity="0.45"/>
  <!-- Sub-lines -->
  <rect x="302" y="180" width="100" height="9" rx="4.5" fill="#1a4d34" opacity="0.22"/>
  <rect x="302" y="198" width="116" height="9" rx="4.5" fill="#1a4d34" opacity="0.18"/>
  <rect x="302" y="216" width="88"  height="9" rx="4.5" fill="#1a4d34" opacity="0.15"/>
  <!-- Price block -->
  <rect x="302" y="288" width="132" height="42" rx="10" fill="#e8f5ee"/>
  <rect x="316"  y="299" width="64"  height="10" rx="5" fill="#2d7a56" opacity="0.7"/>
  <rect x="316"  y="313" width="44"  height="8"  rx="4" fill="#2d7a56" opacity="0.45"/>

  <!-- ── VS divider pill ── -->
  <rect x="231" y="230" width="50" height="52" rx="26" fill="#1a4d34" opacity="0.55"/>
  <text x="256" y="264" font-size="22" font-weight="900"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        text-anchor="middle" fill="white" opacity="0.9">VS</text>

  <!-- ── Checkmark badge ── -->
  <g filter="url(#badgeShadow)">
    <circle cx="393" cy="134" r="46" fill="#40c47a"/>
    <!-- Inner ring -->
    <circle cx="393" cy="134" r="46" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>
  </g>
  <!-- Checkmark -->
  <polyline points="371,134 387,150 418,116"
            stroke="white" stroke-width="10" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
